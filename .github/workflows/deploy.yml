name: Deploy to HostMyIdea

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "ENVIRONMENT=production" >> .env
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASS=${{ secrets.PROD_DB_PASS }}" >> .env
          echo "SITE_URL=${{ secrets.SITE_URL }}" >> .env
          echo "SITE_NAME=\"${{ secrets.SITE_NAME }}\"" >> .env
          echo "RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}" >> .env
          echo "RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}" >> .env
          echo "SMTP_HOST=${{ secrets.SMTP_HOST }}" >> .env
          echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> .env
          echo "SMTP_PASS=${{ secrets.SMTP_PASS }}" >> .env
          echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> .env
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
          echo ".env file created successfully"

      - name: Lint PHP Files
        run: find . -name "*.php" -print0 | xargs -0 -n1 php -l
        continue-on-error: true

      - name: Install SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}

      - name: Validate SSH Connection
        run: |
          ssh -o ConnectTimeout=10 -o StrictHostKeyChecking=accept-new ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "echo 'SSH connection successful' && pwd"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}

      - name: Deploy files via SSH/Tar+SCP
        run: |
          set -e
          tar --exclude='.git' --exclude='.github' --exclude='node_modules' --exclude='.gitignore' --exclude='*.sql' --exclude='*.md' --exclude='maintenance.html' --exclude='last_commit.diff' --exclude='.env.example' -czf /tmp/deploy.tar.gz . && scp -o ConnectTimeout=10 -o StrictHostKeyChecking=no /tmp/deploy.tar.gz ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/ && ssh -o ConnectTimeout=10 -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p ${{ secrets.DEPLOYMENT_PATH }} && cd ${{ secrets.DEPLOYMENT_PATH }} && tar -xzf /tmp/deploy.tar.gz && rm /tmp/deploy.tar.gz && echo 'Deployment complete'"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}

      - name: Remove Sensitive Files from Deployment
        run: |
          ssh -o ConnectTimeout=10 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd ${{ secrets.DEPLOYMENT_PATH }} && rm -f .env.example last_commit.diff maintenance.html *.md 2>/dev/null || true && echo 'Cleanup complete'"
        continue-on-error: true
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}

      - name: Verify Deployment
        run: |
          ssh -o ConnectTimeout=10 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd ${{ secrets.DEPLOYMENT_PATH }} && echo 'Deployment Directory Contents:' && ls -lah | head -20 && test -f index.php && echo 'index.php found' || echo 'index.php not found'"
        continue-on-error: true
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}

      - name: Run Post-Deployment Tasks
        run: |
          ssh -o ConnectTimeout=10 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd ${{ secrets.DEPLOYMENT_PATH }} && chmod +x post_deploy.sh && ./post_deploy.sh"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PASS: ${{ secrets.PROD_DB_PASS }}

      - name: Notify Deployment Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "SUCCESS: Deployment completed!"
            echo "Website: https://thecodingscience.com"
          else
            echo "FAILURE: Deployment failed. Check logs above."
          fi

# REQUIRED GITHUB SECRETS:
# - SSH_PRIVATE_KEY: Content of ~/.ssh/id_rsa
# - SSH_HOST: HostMyIdea SSH hostname
# - SSH_USER: SSH username
# - DEPLOYMENT_PATH: Remote deployment path
# - All database, Razorpay, SMTP, and Google OAuth secrets
