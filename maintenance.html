<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Maintenance - The Coding Science</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .maintenance-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            padding: 60px 40px;
            text-align: center;
            max-width: 500px;
        }
        .icon-gear {
            font-size: 5rem;
            color: #667eea;
            animation: spin 3s linear infinite;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="maintenance-card">
        <i class="fas fa-cog icon-gear mb-4"></i>
        <h1 class="h3 mb-3">We'll Be Right Back!</h1>
        <p class="text-muted mb-4">
            We're currently performing some scheduled maintenance. 
            We'll be back online shortly!
        </p>
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <hr class="my-4">
        <p class="text-muted small mb-0">
            <i class="fas fa-envelope me-2"></i> Contact: csdsofficial249@gmail.com
        </p>
    </div>
</body>
</html>
